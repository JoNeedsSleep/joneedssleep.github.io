<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="google-site-verification" content="jt9At6_cElui-c-8ZWCh1PDxmq3WT2H96QB5ixkQecs" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>{{ site.title }}</title>
    <link rel="icon" type="image/x-icon" href="{{ site.baseurl }}/favicon.ico" sizes="96x96">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&family=Special+Gothic+Expanded+One&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #F7F4ED;
            --text-color: #1a1a1a;
            --link-hover-color: #ffce6b;
            --button-bg: #1a1a1a;
            --button-text: #F7F4ED;
            --active-button-bg: #ffce6b;
            --canvas-bg: #F7F4ED;
            --cell-color: rgba(26, 26, 26, 0.05);
        }

        [data-theme="dark"] {
            --bg-color: #222;
            --text-color: #e0e0e0;
            --link-hover-color: #ffce6b;
            --button-bg: #444;
            --button-text: #e0e0e0;
            --active-button-bg: #ffce6b;
            --canvas-bg: #222;
            --cell-color: rgba(224, 224, 224, 0.05);
        }

        html {
            overflow-y: scroll;
        }

        body {
            font-family: 'Noto Sans', sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: var(--text-color);
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .container {
            max-width: 900px;
            margin: 5rem auto;
            padding: 2rem;
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 3rem;
            flex: 1;
            position: relative;
            z-index: 1;
            align-items: start;
        }

        .left-column {
            text-align: right;
            position: sticky;
            top: 2rem;
            height: fit-content;
            /* Own composited layer: keeps the 3D toggle moving atomically with
               the sticky column during scroll (avoids 3D-in-sticky glitches). */
            transform: translateZ(0);
        }

        .name {
            font-family: 'Special Gothic Expanded One', sans-serif;
            font-size: 1.8rem;
            color: var(--text-color);
            margin-bottom: 0.6rem;
            letter-spacing: 0.05em;
            margin-top: 4.75rem;
            font-weight: normal;
        }

        .theme-toggle {
            --view-x: 58deg;
            --view-z: -42deg;
            --bw: 116px;
            --bd: 74px;
            --bh: 40px;
            --scale: 0.6;
            --lid-fixed: 0.33;
            --riser-base-z: -20px;
            --riser-h: 15px;
            --riser-h-full: 52px;
            --riser-t: 6px;
            --finger-h: 6px;
            --finger-len: 14px;
            --finger-full: 50px;
            --finger-overlap: 3px;
            --sw-tz: translateZ(calc(var(--bh) / 2 + 1px));
            --sw-tx: translateX(calc(var(--bw) / -2 + (var(--bw) * var(--lid-fixed)) / 2));
            background: transparent;
            border: 0;
            padding: 0;
            cursor: pointer;
            color: var(--text-color);
            line-height: 0;
            display: block;
            margin: 0 0 0.6rem auto;
            transition: color 0.3s ease;
        }

        .theme-toggle:focus { outline: none; }
        .theme-toggle:focus-visible {
            outline: 2px solid currentColor;
            outline-offset: 8px;
            border-radius: 4px;
        }

        .theme-toggle .ub-stage {
            display: inline-block;
            width: calc(var(--bw) * var(--scale));
            height: calc((var(--bd) + var(--bh)) * var(--scale));
            perspective: 900px;
            position: relative;
            /* Self-contained stacking context so ancestor opacity/max-height
               transitions (e.g. the essay page's collapsible column) can't
               interfere with the 3D rendering context. */
            isolation: isolate;
        }
        .theme-toggle .ub-world {
            position: absolute; inset: 0;
            transform-style: preserve-3d;
            transform: scale(var(--scale)) rotateX(var(--view-x)) rotateZ(var(--view-z));
            transform-origin: center center;
        }

        .theme-toggle .face {
            position: absolute;
            box-sizing: border-box;
            border: 2px solid currentColor;
            background: var(--bg-color);
            transition: background 0.3s ease;
        }
        .theme-toggle .f-bottom { width: var(--bw); height: var(--bd); left: 50%; top: 50%; margin-left: calc(var(--bw) / -2); margin-top: calc(var(--bd) / -2); transform: translateZ(calc(var(--bh) / -2)); }
        .theme-toggle .f-front  { width: var(--bw); height: var(--bh); left: 50%; top: 50%; margin-left: calc(var(--bw) / -2); margin-top: calc(var(--bh) / -2); transform: translateY(calc(var(--bd) / 2)) rotateX(90deg); }
        .theme-toggle .f-back   { width: var(--bw); height: var(--bh); left: 50%; top: 50%; margin-left: calc(var(--bw) / -2); margin-top: calc(var(--bh) / -2); transform: translateY(calc(var(--bd) / -2)) rotateX(90deg); }
        .theme-toggle .f-left   { width: var(--bd); height: var(--bh); left: 50%; top: 50%; margin-left: calc(var(--bd) / -2); margin-top: calc(var(--bh) / -2); transform: translateX(calc(var(--bw) / -2)) rotateX(90deg) rotateY(90deg); }
        .theme-toggle .f-right  { width: var(--bd); height: var(--bh); left: 50%; top: 50%; margin-left: calc(var(--bd) / -2); margin-top: calc(var(--bh) / -2); transform: translateX(calc(var(--bw) / 2)) rotateX(90deg) rotateY(90deg); }

        .theme-toggle .lid-fixed {
            width: calc(var(--bw) * var(--lid-fixed));
            height: var(--bd);
            left: 50%; top: 50%;
            margin-top: calc(var(--bd) / -2);
            margin-left: calc(var(--bw) / -2);
            transform: translateZ(calc(var(--bh) / 2));
        }
        .theme-toggle .lid-hinge {
            position: absolute;
            width: calc(var(--bw) * (1 - var(--lid-fixed)));
            height: var(--bd);
            left: 50%; top: 50%;
            margin-top: calc(var(--bd) / -2);
            margin-left: calc(var(--bw) / 2 - var(--bw) * (1 - var(--lid-fixed)));
            transform-style: preserve-3d;
            transform: translateZ(calc(var(--bh) / 2));
            transform-origin: right center;
        }
        .theme-toggle .lid-panel {
            position: absolute; inset: 0;
            transform-style: preserve-3d;
            transform-origin: right center;
            transform: rotateY(0deg);
        }
        .theme-toggle .lid-panel .face { position: absolute; inset: 0; }

        .theme-toggle .switch {
            position: absolute;
            left: 50%; top: 50%;
            width: 4px; height: 22px;
            margin-left: -2px;
            margin-top: -22px;
            background: currentColor;
            border-radius: 2px;
            transform-origin: 50% 100%;
            transform: var(--sw-tz) var(--sw-tx) rotateY(300deg) rotateX(-90deg);
        }
        .theme-toggle .switch-bezel {
            position: absolute;
            left: 50%; top: 50%;
            width: 7px; height: 7px;
            margin-left: -3.5px;
            margin-top: -3.5px;
            background: currentColor;
            transform: translateZ(calc(var(--bh) / 2 + 0.5px)) var(--sw-tx);
        }

        .theme-toggle .arm-root {
            position: absolute;
            left: 50%; top: 50%;
            width: 0; height: 0;
            transform-style: preserve-3d;
        }
        .theme-toggle .arm-lift {
            position: absolute;
            left: 0; top: 0;
            width: 0; height: 0;
            transform-style: preserve-3d;
            transform: translateZ(calc(var(--riser-base-z) + var(--riser-h)));
        }

        .theme-toggle .arm-riser {
            position: absolute;
            left: 0; top: 0;
            width: var(--riser-t); height: var(--riser-t);
            margin-left: calc(var(--riser-t) / -2);
            margin-top: calc(var(--riser-t) / -2);
            transform-style: preserve-3d;
        }
        .theme-toggle .arm-riser .rface {
            position: absolute;
            background: currentColor;
            box-sizing: border-box;
            left: 0; top: 0;
        }
        .theme-toggle .arm-riser .rface-x  { width: var(--riser-t); height: var(--riser-h); transform-origin: top center; transform: rotateX(-90deg); }
        .theme-toggle .arm-riser .rface-x2 { width: var(--riser-t); height: var(--riser-h); transform-origin: top center; transform: translateY(var(--riser-t)) rotateX(-90deg); }
        .theme-toggle .arm-riser .rface-y  { width: var(--riser-h); height: var(--riser-t); transform-origin: left center; transform: rotateY(90deg); }
        .theme-toggle .arm-riser .rface-y2 { width: var(--riser-h); height: var(--riser-t); transform-origin: left center; transform: translateX(var(--riser-t)) rotateY(90deg); }
        .theme-toggle .arm-riser .rface-top    { width: var(--riser-t); height: var(--riser-t); }
        .theme-toggle .arm-riser .rface-bottom { width: var(--riser-t); height: var(--riser-t); transform: translateZ(calc(0px - var(--riser-h))); }

        .theme-toggle .arm-finger {
            position: absolute;
            left: 0; top: 0;
            width: calc(var(--finger-len) + var(--riser-t) / 2);
            height: var(--finger-h);
            margin-left: calc(0px - var(--finger-len));
            margin-top: calc(var(--finger-h) / -2);
            transform-style: preserve-3d;
            transform: translateZ(calc(var(--finger-h) / 2 - var(--finger-overlap)));
        }
        .theme-toggle .arm-finger .fface {
            position: absolute;
            background: currentColor;
            box-sizing: border-box;
            left: 0; top: 0;
        }
        .theme-toggle .arm-finger .fface-top    { width: 100%; height: var(--finger-h); }
        .theme-toggle .arm-finger .fface-bottom { width: 100%; height: var(--finger-h); transform: translateZ(calc(0px - var(--finger-h))); }
        .theme-toggle .arm-finger .fface-front  { width: 100%; height: var(--finger-h); transform-origin: top center; transform: rotateX(-90deg); }
        .theme-toggle .arm-finger .fface-back   { width: 100%; height: var(--finger-h); transform-origin: top center; transform: translateY(var(--finger-h)) rotateX(-90deg); }
        .theme-toggle .arm-finger .fface-cap-r  { width: var(--finger-h); height: var(--finger-h); left: auto; right: 0; transform-origin: right center; transform: rotateY(-90deg); }
        .theme-toggle .arm-finger .fface-cap-l  { width: var(--finger-h); height: var(--finger-h); transform-origin: left center; transform: rotateY(90deg); }

        .theme-toggle.is-playing .lid-panel { animation: theme-toggle-lid 2000ms ease both; }
        .theme-toggle.is-playing .switch    { animation: theme-toggle-flick 2000ms ease both; }
        /* Telescope: plain transform/size keyframes per element instead of
           animating registered custom properties (@property), which is the
           least-supported animation path and glitches in some engines. */
        .theme-toggle.is-playing .arm-lift  { animation: theme-toggle-lift 2000ms ease both; }
        .theme-toggle.is-playing .arm-riser .rface-x,
        .theme-toggle.is-playing .arm-riser .rface-x2 { animation: theme-toggle-riser-x 2000ms ease both; }
        .theme-toggle.is-playing .arm-riser .rface-y,
        .theme-toggle.is-playing .arm-riser .rface-y2 { animation: theme-toggle-riser-y 2000ms ease both; }
        .theme-toggle.is-playing .arm-riser .rface-bottom { animation: theme-toggle-riser-bottom 2000ms ease both; }
        .theme-toggle.is-playing .arm-finger { animation: theme-toggle-finger 2000ms ease both; }

        @keyframes theme-toggle-lid {
            0%, 12%   { transform: rotateY(0deg); }
            25%, 76%  { transform: rotateY(26deg); }
            100%      { transform: rotateY(0deg); }
        }
        /* Riser at rest / extended: 15px (--riser-h) / 52px (--riser-h-full) */
        @keyframes theme-toggle-lift {
            0%, 25%   { transform: translateZ(calc(var(--riser-base-z) + var(--riser-h))); }
            38%, 62%  { transform: translateZ(calc(var(--riser-base-z) + var(--riser-h-full))); }
            76%, 100% { transform: translateZ(calc(var(--riser-base-z) + var(--riser-h))); }
        }
        @keyframes theme-toggle-riser-x {
            0%, 25%   { height: var(--riser-h); }
            38%, 62%  { height: var(--riser-h-full); }
            76%, 100% { height: var(--riser-h); }
        }
        @keyframes theme-toggle-riser-y {
            0%, 25%   { width: var(--riser-h); }
            38%, 62%  { width: var(--riser-h-full); }
            76%, 100% { width: var(--riser-h); }
        }
        @keyframes theme-toggle-riser-bottom {
            0%, 25%   { transform: translateZ(calc(0px - var(--riser-h))); }
            38%, 62%  { transform: translateZ(calc(0px - var(--riser-h-full))); }
            76%, 100% { transform: translateZ(calc(0px - var(--riser-h))); }
        }
        /* Finger at rest / extended: 14px (--finger-len) / 50px (--finger-full) */
        @keyframes theme-toggle-finger {
            0%, 38%   { width: calc(var(--finger-len) + var(--riser-t) / 2); margin-left: calc(0px - var(--finger-len)); }
            46%, 50%  { width: calc(var(--finger-full) + var(--riser-t) / 2); margin-left: calc(0px - var(--finger-full)); }
            62%, 100% { width: calc(var(--finger-len) + var(--riser-t) / 2); margin-left: calc(0px - var(--finger-len)); }
        }
        @keyframes theme-toggle-flick {
            0%        { transform: var(--sw-tz) var(--sw-tx) rotateY(300deg) rotateX(-90deg); }
            12%, 44%  { transform: var(--sw-tz) var(--sw-tx) rotateY(420deg) rotateX(-90deg); }
            49%, 100% { transform: var(--sw-tz) var(--sw-tx) rotateY(300deg) rotateX(-90deg); }
        }

        @media (prefers-reduced-motion: reduce) {
            .theme-toggle.is-playing .lid-panel,
            .theme-toggle.is-playing .arm-lift,
            .theme-toggle.is-playing .arm-riser .rface,
            .theme-toggle.is-playing .arm-finger,
            .theme-toggle.is-playing .switch { animation: none; }
        }

        @media screen and (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                margin: 2rem auto;
                padding: 1rem;
                row-gap: 0.25rem;
            }

            .left-column {
                text-align: center;
                position: static;
                padding: 0;
                margin-bottom: 0.1rem;
            }

            .name {
                font-size: 2.25rem;
                margin-top: 2.5rem;
                margin-bottom: 0.4rem;
            }

            .theme-toggle {
                margin: 0 auto 0.6rem;
            }

            .social-links {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                gap: 0.6rem;
                margin-top: 0.3rem;
                margin-bottom: 0.15rem;
            }

            .social-links a {
                display: inline-block;
                margin: 0;
            }

            .right-column {
                padding: 0 0.75rem;
                margin-top: 0.1rem;
            }

            .container.research-page .right-column {
                margin-top: 0.1rem;
            }

            .game-controls {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                gap: 0.65rem;
            }

            .game-controls button {
                margin: 0;
            }
        }

        @media screen and (max-width: 480px) {
            .container {
                margin: 1rem auto;
            }

            .name {
                font-size: 2rem;
                margin-top: 2.5rem;
                margin-bottom: 0.75rem;
            }

            .social-links {
                gap: 0.45rem;
            }

            .social-links a {
                font-size: 0.8rem;
            }

            .right-column {
                padding: 0 0.5rem;
            }
        }

        canvas#gameCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-color: var(--canvas-bg);
            transition: background-color 0.3s ease;
        }

        canvas#interactionCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            background-color: transparent;
            pointer-events: none;
            cursor: default;
        }

        canvas#interactionCanvas.draw-mode {
            pointer-events: auto;
            cursor: crosshair;
        }

        .game-controls {
            margin-top: 2rem;
            margin-bottom: 80vh;
            position: relative;
            z-index: 101;
            pointer-events: auto;
            display: flex;
            gap: 0.5rem;
            justify-content: center;
        }

        .game-controls button {
            background: transparent;
            color: var(--text-color);
            border: none;
            padding: 0;
            margin: 0;
            width: 28px;
            height: 28px;
            cursor: pointer;
            opacity: 1;
            transition: color 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .game-controls button.active {
            color: var(--link-hover-color);
        }

        .game-controls button svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
            stroke: none;
        }

        .game-controls #startButton .icon-pause { display: none; }
        .game-controls #startButton.active .icon-play { display: none; }
        .game-controls #startButton.active .icon-pause { display: inline-block; }

        .social-links {
            margin-top: 0.25rem;
        }

        .social-links a {
            color: var(--text-color);
            text-decoration: none;
            display: block;
            margin-top: 0.5rem;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .social-links a:hover {
            color: var(--link-hover-color);
        }

        .social-links a:visited {
            color: var(--text-color);
        }

        .social-links a:visited:hover {
            color: var(--link-hover-color);
        }

        .right-column {
            max-width: 600px;
            margin-top: 4rem;
        }

        @media screen and (max-width: 768px) {
            .right-column {
                margin-top: 0.1rem;
            }

            .container.research-page .right-column {
                margin-top: 0.75rem;
            }

            /* Body paragraphs on mobile: 0.9rem with line-height 1.7.
               Targets direct-child p and details p so writing-entry /
               research-entry sizing isn't double-applied. */
            .right-column > p,
            .right-column > details p {
                font-size: 0.9rem;
                line-height: 1.7;
            }
        }

        /* Details/Summary collapsible styling */
        details {
            margin: 1rem 0;
            cursor: pointer;
        }

        summary {
            list-style: none;
            position: relative;
            padding-left: 1.5rem;
            cursor: pointer;
            color: var(--text-color);
            transition: color 0.2s ease;
        }

        summary::-webkit-details-marker {
            display: none;
        }

        /* CSS triangle caret indicator rendered with borders to avoid emoji substitution */
        summary::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 0;
            height: 0;
            border-top: 0.3em solid transparent;
            border-bottom: 0.3em solid transparent;
            border-left: 0.45em solid currentColor;
            transform: translateY(-50%);
            transition: transform 0.2s ease;
        }

        details[open] summary::before {
            transform: translateY(-50%) rotate(90deg);
        }

        summary:hover {
            color: var(--link-hover-color);
        }

        details[open] summary {
            margin-bottom: 0.5rem;
        }

        .author-underline {
            text-decoration: underline;
            text-decoration-color: rgba(255, 206, 107, 0.4);
            text-underline-offset: 2px;
            text-decoration-thickness: 0.5px;
        }

        .right-column p {
            margin-bottom: 1rem;
        }

        .right-column research-entry {
            display: block;
            margin-bottom: 2.25rem;
        }

        .right-column research-entry:last-of-type {
            margin-bottom: 0;
        }

        .right-column research-entry p {
            margin: 0.2rem 0;
            line-height: 1.3;
        }

        .right-column a {
            color: var(--text-color);
            text-decoration: underline;
            transition: all 0.2s ease;
        }

        .right-column a:hover {
            color: var(--link-hover-color);
            text-decoration: underline;
        }

        .right-column a:visited {
            color: var(--text-color);
            text-decoration: underline;
        }

        .right-column a:visited:hover {
            color: var(--link-hover-color);
            text-decoration: underline;
        }
        /* Top navigation styles */
        .top-nav {
            position: fixed;
            top: 1.2rem;
            right: 1.5rem;
            display: flex;
            gap: 1.5rem;
            font-family: 'Noto Sans', sans-serif;
            z-index: 200;
        }

        .top-nav a {
            color: var(--text-color);
            text-decoration: none;
            font-weight: 400;
            transition: color 0.2s, opacity 0.4s ease;
            will-change: opacity;
        }

        .top-nav a:hover {
            color: var(--link-hover-color);
        }
    </style>
    <script>
        (function() {
            var storageKey = 'theme';
            var root = document.documentElement;
            function getStoredTheme() {
                try { return localStorage.getItem(storageKey); } catch (e) { return null; }
            }
            function applyTheme(theme) {
                if (theme === 'dark') {
                    root.setAttribute('data-theme', 'dark');
                } else {
                    root.removeAttribute('data-theme');
                }
            }
            var stored = getStoredTheme();
            var prefersDark = false;
            try { prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches; } catch (e) {}
            applyTheme(stored || (prefersDark ? 'dark' : 'light'));
        })();
    </script>
</head>

    <script>
        (function() {
            var base = "{{ site.baseurl }}";
            var path = window.location.pathname;
            var isHome = (base ? path === base + "/" : path === "/");

            var nav = document.querySelector('.top-nav');
            if (!nav) return;

            var ticking = false;
            var fadeDistance = 220;

            function updateOpacity() {
                var y = window.scrollY || window.pageYOffset || 0;
                var opacity = 1 - Math.min(1, y / fadeDistance);
                nav.style.opacity = String(opacity);
                nav.style.pointerEvents = opacity < 0.1 ? 'none' : '';
                ticking = false;
            }

            window.addEventListener('scroll', function() {
                if (!ticking) {
                    window.requestAnimationFrame(updateOpacity);
                    ticking = true;
                }
            }, { passive: true });

            updateOpacity();
        })();
    </script>
    <script>
        (function() {
            var storageKey = 'theme';
            var root = document.documentElement;
            function getStoredTheme() {
                try { return localStorage.getItem(storageKey); } catch (e) { return null; }
            }
            function setStoredTheme(theme) {
                try { localStorage.setItem(storageKey, theme); } catch (e) {}
            }
            function applyTheme(theme) {
                if (theme === 'dark') {
                    root.setAttribute('data-theme', 'dark');
                } else {
                    root.removeAttribute('data-theme');
                }
                var b = document.getElementById('darkModeButton');
                if (b) b.setAttribute('aria-pressed', theme === 'dark' ? 'true' : 'false');
            }
            var btn = document.getElementById('darkModeButton');
            if (btn) {
                var lidPanel = btn.querySelector('.lid-panel');
                btn.addEventListener('click', function() {
                    btn.classList.remove('is-playing');
                    void btn.offsetWidth;
                    btn.classList.add('is-playing');
                    setTimeout(function() {
                        var isDark = root.getAttribute('data-theme') === 'dark';
                        var next = isDark ? 'light' : 'dark';
                        applyTheme(next);
                        setStoredTheme(next);
                    }, 120);
                });
                if (lidPanel) {
                    lidPanel.addEventListener('animationend', function() {
                        btn.classList.remove('is-playing');
                    });
                }
            }
            var mql;
            try { mql = window.matchMedia('(prefers-color-scheme: dark)'); } catch (e) { mql = null; }
            if (mql) {
                var onChange = function(e) {
                    try { localStorage.removeItem(storageKey); } catch(e2) {}
                    applyTheme(e.matches ? 'dark' : 'light');
                };
                if (mql.addEventListener) mql.addEventListener('change', onChange);
                else if (mql.addListener) mql.addListener(onChange);
            }
        })();
    </script>
    <script>
        (function() {
            var leftCol = document.querySelector('.container.essay-page .left-column');
            var rightCol = document.querySelector('.container.essay-page .right-column');
            if (!leftCol || !rightCol) return;

            function isNarrow() { return window.innerWidth <= 768; }

            var buffer = 90;   // px below left-column bottom where sidenotes start
            var fadeZone = 80; // px: fade starts this far below leftBottom, completes at leftBottom
            var ticking = false;

            var pairs = [];
            document.querySelectorAll('.container.essay-page .sidenote').forEach(function(sn) {
                var numEl = sn.querySelector('.sidenote-number');
                if (!numEl) return;
                var n = numEl.textContent.trim();
                var sup = null;
                document.querySelectorAll('.sidenote-ref').forEach(function(el) {
                    if (el.textContent.trim() === n) sup = el;
                });
                if (sup) pairs.push({ sn: sn, sup: sup, offset: 0 });
            });
            if (!pairs.length) return;

            function initOffsets() {
                if (isNarrow()) return;
                var savedScroll = window.scrollY || window.pageYOffset || 0;
                if (savedScroll !== 0) window.scrollTo(0, 0);
                var leftBottom = leftCol.getBoundingClientRect().bottom + buffer;
                var prevBottom = -Infinity;
                var gap = 8;
                pairs.forEach(function(p) {
                    var supTop = p.sup.getBoundingClientRect().top;
                    var snHeight = p.sn.getBoundingClientRect().height;
                    var targetTop = Math.max(supTop, leftBottom, prevBottom + gap);
                    p.offset = targetTop - supTop;
                    prevBottom = targetTop + snHeight;
                });
                if (savedScroll !== 0) window.scrollTo(0, savedScroll);
            }

            function updateSidenotes() {
                if (isNarrow()) { ticking = false; return; }
                var leftBottom = leftCol.getBoundingClientRect().bottom + buffer;
                var rcTop = rightCol.getBoundingClientRect().top;

                pairs.forEach(function(p) {
                    var supTop = p.sup.getBoundingClientRect().top;
                    var snTop = supTop + p.offset;

                    p.sn.style.top = (supTop - rcTop + p.offset) + 'px';

                    if (snTop >= leftBottom) {
                        p.sn.style.opacity = '1';
                    } else if (snTop >= leftBottom - fadeZone) {
                        p.sn.style.opacity = String((snTop - (leftBottom - fadeZone)) / fadeZone);
                    } else {
                        p.sn.style.opacity = '0';
                    }
                });
                ticking = false;
            }

            window.addEventListener('scroll', function() {
                if (!ticking) {
                    window.requestAnimationFrame(updateSidenotes);
                    ticking = true;
                }
            }, { passive: true });

            window.addEventListener('resize', function() {
                initOffsets();
                updateSidenotes();
            }, { passive: true });

            document.addEventListener('sidenotes:refresh', function() {
                initOffsets();
                updateSidenotes();
            });

            initOffsets();
            updateSidenotes();

            if (document.fonts && document.fonts.ready) {
                document.fonts.ready.then(function() {
                    initOffsets();
                    updateSidenotes();
                });
            }
        })();
    </script>
</body>
